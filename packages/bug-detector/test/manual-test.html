<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BugDetector Pro - Teste Manual</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      color: #e2e8f0;
      padding: 40px;
    }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle { color: #94a3b8; margin-bottom: 40px; }
    
    .test-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .test-section h2 { color: #60a5fa; margin-bottom: 20px; font-size: 1.3rem; }
    
    .button-group { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
    
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
    
    .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #e2e8f0; }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
    
    .btn-danger { background: linear-gradient(135deg, #ef4444, #f97316); color: white; }
    
    .card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 20px;
      margin: 15px 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .console-output {
      background: #0f172a;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      color: #94a3b8;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .console-output .log { color: #94a3b8; }
    .console-output .info { color: #60a5fa; }
    .console-output .success { color: #10b981; }
    .console-output .error { color: #ef4444; }
    .console-output .warn { color: #f59e0b; }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }
    .status-active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .status-inactive { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐛 BugDetector Pro</h1>
    <p class="subtitle">Ambiente de Teste Manual - v2.0</p>
    
    <div class="test-section">
      <h2>1. Teste de Ativação</h2>
      <div class="button-group">
        <button class="btn-primary" id="btn-activate">🚀 Ativar BugDetector</button>
        <button class="btn-secondary" id="btn-status">📊 Ver Status</button>
        <button class="btn-danger" id="btn-test-error">⚠️ Gerar Erro</button>
      </div>
      <div id="status-area"></div>
    </div>
    
    <div class="test-section">
      <h2>2. Elementos para Inspeção</h2>
      <p style="color: #94a3b8; margin-bottom: 15px;">Ative o BugDetector e clique em qualquer elemento para inspecionar.</p>
      <div class="grid">
        <div class="card" data-test="card-1">
          <h3>Card Interativo</h3>
          <p>Clique aqui para testar</p>
        </div>
        <div class="card" data-test="card-2">
          <h3>Formulário</h3>
          <input type="text" placeholder="Digite algo..." style="padding: 8px; margin-top: 10px; width: 100%;">
        </div>
        <div class="card" data-test="card-3">
          <h3>Botões</h3>
          <button class="btn-primary" style="margin-right: 10px;">Ação 1</button>
          <button class="btn-secondary">Ação 2</button>
        </div>
      </div>
    </div>
    
    <div class="test-section">
      <h2>3. Console de Logs</h2>
      <div class="console-output" id="console">
        <div class="log">Sistema pronto. Aguardando ativação...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { BugDetector } from '../dist/index.esm.js';
    
    let detector = null;
    let isActivated = false;
    
    // Log visual na página (sem interceptar console para evitar loops)
    function logUI(msg, type = 'log') {
      const consoleEl = document.getElementById('console');
      const div = document.createElement('div');
      div.className = type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      consoleEl.appendChild(div);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }
    
    function updateStatus() {
      const statusArea = document.getElementById('status-area');
      if (isActivated) {
        statusArea.innerHTML = '<span class="status-badge status-active">● ATIVO - Clique em qualquer elemento</span>';
      } else {
        statusArea.innerHTML = '<span class="status-badge status-inactive">● INATIVO</span>';
      }
    }
    
    document.getElementById('btn-activate').addEventListener('click', () => {
      try {
        if (!detector) {
          detector = new BugDetector({
            trigger: 'manual',
            zIndexBase: 999999,
            capture: { console: true, network: true, screenshot: false },
            callbacks: {
              onActivate: () => {
                logUI('BugDetector ativado!', 'success');
                isActivated = true;
                updateStatus();
              },
              onDeactivate: () => {
                logUI('BugDetector desativado', 'info');
                isActivated = false;
                updateStatus();
              },
              onElementSelected: (el) => {
                logUI(`Elemento: ${el.tag}${el.id ? '#' + el.id : ''}`, 'info');
              },
              onReportCreated: (report) => {
                logUI(`Relatório: ${report.id}`, 'success');
              }
            }
          });
        }
        
        if (!isActivated) {
          detector.activate();
          logUI('Ativando modo de inspeção...', 'info');
        } else {
          detector.deactivate();
        }
      } catch (e) {
        logUI('Erro: ' + e.message, 'error');
        console.error(e);
      }
    });
    
    document.getElementById('btn-status').addEventListener('click', () => {
      logUI('Status: ' + (isActivated ? 'Ativo' : 'Inativo'), isActivated ? 'success' : 'warn');
    });
    
    document.getElementById('btn-test-error').addEventListener('click', () => {
      logUI('Gerando erro de teste...', 'warn');
      setTimeout(() => { throw new Error('Erro de teste!'); }, 100);
    });
    
    window.addEventListener('error', (e) => {
      logUI('Erro capturado: ' + e.message, 'error');
    });
    
    updateStatus();
    logUI('Página carregada. Pronto.', 'success');
  </script>
</body>
</html>
